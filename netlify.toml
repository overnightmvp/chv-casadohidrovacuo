# Netlify configuration for Casa do Hidrovácuo

[build]
  # Directory with static files
  publish = "public"

  # No build command needed for static site
  command = ""

# ── Canonical domain: force https + non-www ──
[[redirects]]
  from = "https://www.casadohidrovacuo.com.br/*"
  to = "https://casadohidrovacuo.com.br/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.casadohidrovacuo.com.br/*"
  to = "https://casadohidrovacuo.com.br/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://casadohidrovacuo.com.br/*"
  to = "https://casadohidrovacuo.com.br/:splat"
  status = 301
  force = true

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"

[[headers]]
  for = "/indexnow-key.txt"
  [headers.values]
    Content-Type = "text/plain"
    Cache-Control = "public, max-age=86400"
